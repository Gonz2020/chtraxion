{% extends 'base.html' %}{% set active='hoja_ruta' %}{% set page_title='Hoja de Ruta Digital' %}{% block content %}<div class="card"><h2>Hoja de Ruta - {{ c.nombre }}</h2><p><b>Puesto:</b> {{ c.puesto }} | <b>UDN:</b> {{ c.udn }}</p><form method="post" class="form"><div class="field"><label>Ruta de transporte</label><input name="ruta_transporte" value="{{ data.ruta_transporte if data else '' }}"></div><div class="field"><label>Parada</label><input name="parada" value="{{ data.parada if data else '' }}"></div><div class="field"><label>Handheld</label><select name="handheld"><option>No</option><option {% if data and data.handheld=='Si' %}selected{% endif %}>Si</option></select></div><div class="field"><label>WMS</label><select name="wms"><option>No</option><option {% if data and data.wms=='Si' %}selected{% endif %}>Si</option></select></div><div class="field"><label>SAP</label><select name="sap"><option>No</option><option {% if data and data.sap=='Si' %}selected{% endif %}>Si</option></select></div><div class="field"><label>Excel</label><select name="excel"><option>No</option><option {% if data and data.excel=='Si' %}selected{% endif %}>Si</option></select></div><div class="field"><label>Patín / tipo</label><input name="patin" value="{{ data.patin if data else '' }}"></div><div class="field"><label>Montacargas / tipo</label><input name="montacargas" value="{{ data.montacargas if data else '' }}"></div><div class="field"><label>Reingreso Traxión</label><select name="reingreso_traxion"><option>No</option><option {% if data and data.reingreso_traxion=='Si' %}selected{% endif %}>Si</option></select></div><div class="field"><label>Reingreso Cliente</label><select name="reingreso_cliente"><option>No</option><option {% if data and data.reingreso_cliente=='Si' %}selected{% endif %}>Si</option></select></div><div class="field"><label>Contacto emergencia</label><input name="emergencia_nombre" value="{{ data.emergencia_nombre if data else '' }}"></div><div class="field"><label>Parentesco</label><input name="emergencia_parentesco" value="{{ data.emergencia_parentesco if data else '' }}"></div><div class="field"><label>Teléfono emergencia</label><input name="emergencia_telefono" value="{{ data.emergencia_telefono if data else '' }}"></div><div class="field full"><label>Experiencia laboral últimos 3 empleos</label><textarea name="experiencia_json" rows="5" placeholder="Empresa | Giro | Puesto | Permanencia | Sueldo | Horario | Rolaba turnos">{{ data.experiencia_json if data else '' }}</textarea></div><div class="field full"><button class="btn primary">Guardar Hoja de Ruta</button><a class="btn dark" href="{{ url_for('candidato_detalle', candidato_id=c.id) }}">Volver</a></div></form></div>{% endblock %}
